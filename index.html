<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City Hospital</title>
    <meta name="description" id="meta-description" content="Welcome to City Hospital - providing quick and affordable healthcare for everyone with experienced doctors and modern medical care.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script type="module" src="https://unpkg.com/@splinetool/viewer@1.9.4/build/spline-viewer.js"></script>
    <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.183.2/build/three.module.js",
        "three/webgpu": "https://cdn.jsdelivr.net/npm/three@0.183.2/build/three.webgpu.js",
        "three/tsl": "https://cdn.jsdelivr.net/npm/three@0.183.2/build/three.tsl.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.183.2/examples/jsm/"
      }
    }
    </script>
</head>
<body>

    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="logo">
                <span class="logo-icon">+</span>
                <span class="logo-text" id="hospital-name">City Hospital</span>
            </div>
            <nav class="nav" id="nav-menu">
                <!-- Navigation populated via JS -->
            </nav>
            <div class="mobile-menu-btn">☰</div>
        </div>
    </header>

    <!-- Main Content Area -->
    <main id="app">
        <!-- Content dynamically injected here -->
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-grid">
                <div class="footer-col">
                    <h3 id="footer-name">City Hospital</h3>
                    <p id="footer-address">Address...</p>
                </div>
                <div class="footer-col">
                    <h3>Contact Us</h3>
                    <p id="footer-phone">Phone...</p>
                    <p id="footer-email">Email...</p>
                </div>
                <div class="footer-col">
                    <h3>Quick Links</h3>
                    <ul id="footer-links">
                        <!-- Populated by JS -->
                    </ul>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; <span id="current-year"></span> City Hospital. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <div id="toast-container"></div>
    <script defer src="app.js"></script>
    <script type="module" src="three-bg.js"></script>
</body>
</html>
